{{ define "main" }}
  {{ with .GetPage "_index.md" }}
    <article class="main-article">
      <header class="article-header">
        <h1 class="article-title">{{ .Title }}</h1>
      </header>
      <section class="article-content">
        {{ .Content }}
      </section>
    </article>
  {{ end }}
{{ end }}
